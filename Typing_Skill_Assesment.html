<!DOCTYPE html>
<html lang="en">

<head>
  <title>Typing Skill Assesment</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
<div class="container mt-3">
  <p>Clock: <span id="clock"></span></p> 
  <p>Timer: <span id="timer">00:00:00</span></p> 
  <div class="mt-4">
    <textarea class="form-control" id="typingArea" rows="10" placeholder="Start typing..."></textarea>
  </div>
  <div class="row mt-2">
    <h5>Summary</h5>
    <p>Total characters: <span id="totalChars">0</span></p>
    <p>Total words: <span id="totalWords">0</span></p>
    <p>Total sentences: <span id="totalSentences">0</span></p>
  </div>
  <button class="btn btn-primary mt-2" onclick="reset()">reset</button>
</div>
<script>
    function startClock() {
        setInterval(function() {
            var now = new Date();
            var timeString = now.toLocaleTimeString();
            document.getElementById('clock').textContent = timeString;
        }, 1000);
    }
    let isTyping = false;
    let startTime;
    let typingArea = document.getElementById('typingArea');
    
    typingArea.addEventListener('input', updateStats);
    typingArea.addEventListener('focus', async () => {
        if (!isTyping) {
            await startTypingTimer();
        }
    });
    
    document.addEventListener('click', (e) => {
        if (!typingArea.contains(e.target) && isTyping) {
            stopTyping();
        }
    });
    
    window.onload = function() {
        startClock();
        updateStats();
    };
    function updateStats() {
        var text = typingArea.value;
        var totalChars = text.length;
        var totalWords = text.trim().split(/\s+/).filter(Boolean).length;
        var totalSentences = text.split(/[.!?]+/).filter(Boolean).length;
        document.getElementById('totalChars').textContent = totalChars;
        document.getElementById('totalWords').textContent = totalWords;
        document.getElementById('totalSentences').textContent = totalSentences;
    }
    async function startTypingTimer() {
        isTyping = true;
        startTime = Date.now();
        while (isTyping) {
            await updateTimer();
            await new Promise(resolve => setTimeout(resolve, 100));
        }
    }
    
    async function updateTimer() {
        const elapsed = Date.now() - startTime;
        const seconds = Math.floor(elapsed / 1000);
        const minutes = Math.floor(seconds / 60);
        const hours = Math.floor(minutes / 60);
        const timerEl = document.getElementById('timer');
        timerEl.textContent = `${hours.toString().padStart(2, '0')}:${(minutes % 60).toString().padStart(2, '0')}:${(seconds % 60).toString().padStart(2, '0')}`;
        updateStats();
    }
    
    function stopTyping() {
        isTyping = false;
        typingArea.disabled = true;
    }
    
    function reset() {
        typingArea.value = '';
        document.getElementById('timer').textContent = '00:00:00';
        isTyping = false;
        typingArea.disabled = false;
        updateStats();
    }
</script>
</body>
</html>
